{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<article style="max-width: 400px; margin: 2rem auto;">
  <h2>Log in</h2>
  <form method="post">
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
</article>
{% endblock %}
